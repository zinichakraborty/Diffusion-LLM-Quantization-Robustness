[workspace]
channels = ["conda-forge"]
name = "SMR_Project"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
cython = "*"
setuptools = ">=80.9.0,<81"

[pypi-dependencies]
device-smi = ">=0.5.1, <0.6"
hf-xet = ">=1.2.0, <2"
huggingface-hub = ">=0.36.0, <0.37"
lightning = ">=2.5.6, <3"
lm-eval = ">=0.4.9.1, <0.5"
logbar = ">=0.1.8, <0.2"
math-verify = ">=0.8.0, <0.9"
optimum = ">=2.0.0, <3"
pillow = ">=12.0.0, <13"
safetensors = ">=0.6.2, <0.7"
sympy = ">=1.14.0, <2"
tokenicer = ">=0.0.5, <0.0.6"
torch = ">=2.8.0"
tqdm = ">=4.67.1, <5"
transformers = { version = "==4.49.0", extras = ["torch"] }
pyslurm = { git = "https://github.com/PySlurm/pyslurm.git", branch = "24.11.x" }
gptqmodel = ">=4.2.5, <5"

[pypi-options]
no-build-isolation = ["gptqmodel"]
