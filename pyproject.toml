[project]
name = "research2"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "accelerate>=1.10.1",
    "antlr4-python3-runtime>=4.13.2",
    "hf-xet>=1.1.10",
    "huggingface-hub>=0.35.3",
    "lightning>=2.5.5",
    "lm-eval>=0.4.9.1",
    "math-verify>=0.8.0",
    "sympy>=1.14.0",
    "tqdm>=4.67.1",
    "transformers[torch]>=4.57.0",
]

[dependency-groups]
dev = ["poethepoet>=0.37.0"]

[tool.poe.tasks]
test_llada = "python -m evaluation.llada_generation"
